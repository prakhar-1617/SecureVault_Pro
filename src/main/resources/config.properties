# ============================================================
# SecureVault Pro — Application Configuration
# ============================================================
# All runtime settings are read once by ConfigurationManager
# (Singleton). Modify here; no recompile needed.

# --- Thread Pool ---
thread.pool.size=4

# --- LRU Cache ---
# Maximum number of file-metadata entries cached in memory
cache.size=50

# --- Default Encryption Algorithm ---
# Valid values: AES, XOR, CAESAR
default.algorithm=AES

# --- File Streaming ---
# Files larger than this threshold (bytes) use NIO FileChannel
# Files smaller than this use BufferedInputStream
buffer.size=4096
nio.threshold.bytes=10485760

# --- Database ---
db.url=jdbc:mysql://localhost:3306/securevault?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.user=root
db.password=root123

# --- Security ---
# PBKDF2 iterations (OWASP recommends >= 310,000 for SHA-256)
pbkdf2.iterations=310000
pbkdf2.key.length=256
# Max failed logins before account lock
auth.max.failed.attempts=5

# --- Analytics ---
# How often (seconds) the audit logger flushes queue to DB
audit.flush.interval.seconds=10

# --- Storage ---
# Directory where encrypted files are stored (relative to project root)
encrypted.files.dir=encrypted_files

# --- Brute Force Simulator (Educational Only) ---
bruteforce.max.length=4
bruteforce.charset=abcdefghijklmnopqrstuvwxyz0123456789

# --- HTTP Web Server ---
server.port=8085

